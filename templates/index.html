<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Detection V1</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <h1>Phishing Defender</h1>
        <p class="subtitle">AI Hybrid Prediction Matrix</p>
        
        <form id="predict-form">
            <input type="url" id="url-input" placeholder="https://secure-login-apple.com" required>
            <button type="submit" id="analyze-btn">Analyze</button>
        </form>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Scanning Deep Dimensions...</p>
        </div>

        <div id="result-card" class="hidden">
            <h2 id="verdict-title"></h2>
            <div class="metric-grid">
                <div class="metric">
                    <span>Confidence</span>
                    <strong id="confidence-val"></strong>
                </div>
                <div class="metric">
                    <span>Latency</span>
                    <strong id="latency-val"></strong>
                </div>
            </div>
            
            <div class="explanation-box">
                <h3>V1 Hybrid Engine Logic</h3>
                <p id="reasoning-text"></p>
                
                <h4 class="mt-4">XAI Feature Isolation Log</h4>
                <ul id="xai-list"></ul>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('predict-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = document.getElementById('url-input').value;
            const loading = document.getElementById('loading');
            const resultCard = document.getElementById('result-card');
            const btn = document.getElementById('analyze-btn');
            
            loading.classList.remove('hidden');
            resultCard.classList.add('hidden');
            btn.disabled = true;

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                if(response.status === 429) {
                    alert("Rate Limit Exceeded. Security protocol triggered.");
                    return;
                }

                const data = await response.json();
                
                // Populate the UI
                const title = document.getElementById('verdict-title');
                title.textContent = data.final_verdict;
                
                // Color Code the Verdict via Glassmorphism state classes
                resultCard.className = ''; 
                if(data.final_verdict.includes('PHISHING')) {
                    resultCard.classList.add('verdict-phishing');
                } else if(data.final_verdict.includes('SUSPICIOUS')) {
                    resultCard.classList.add('verdict-suspicious');
                } else {
                    resultCard.classList.add('verdict-safe');
                }

                document.getElementById('confidence-val').textContent = (data.confidence_score * 100).toFixed(1) + '%';
                document.getElementById('latency-val').textContent = data.processing_time_ms + 'ms';
                document.getElementById('reasoning-text').textContent = data.decision_reason;
                
                const xaiList = document.getElementById('xai-list');
                xaiList.innerHTML = '';
                data.decision_metadata.top_contributing_features.forEach(feature => {
                    const li = document.createElement('li');
                    li.textContent = feature;
                    xaiList.appendChild(li);
                });

                resultCard.classList.remove('hidden');
            } catch (err) {
                alert("An error occurred during network trace.");
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
